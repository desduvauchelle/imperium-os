name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # required for creating GitHub Releases

jobs:
  # ============================================================================
  # Sanity gate — typecheck + test before releasing
  # ============================================================================
  verify:
    name: Verify (typecheck + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  # ============================================================================
  # Build Electron distributable — macOS, Windows, Linux
  # ============================================================================
  build-electron:
    name: Electron (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages (shared-types → ui-shared → electron renderer)
        run: bun run build

      # macOS code signing (optional — skipped if secrets are absent)
      - name: Import macOS code-signing certificate
        if: matrix.os == 'macos-latest' && env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: echo "Certificate imported via environment variables"

      - name: Package Electron app
        run: bun --cwd apps/electron run electron:build --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Apple notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
            apps/electron/release/*.exe
            apps/electron/release/*.AppImage
            apps/electron/release/*.deb
          if-no-files-found: warn
          retention-days: 7

  # ============================================================================
  # Build Web SPA
  # ============================================================================
  build-web:
    name: Web SPA
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Archive web dist
        run: |
          cd apps/web
          tar -czf ../../imperium-web-${{ github.ref_name }}.tar.gz dist/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-spa
          path: imperium-web-${{ github.ref_name }}.tar.gz
          retention-days: 7

  # ============================================================================
  # Create GitHub Release and attach all artifacts
  # ============================================================================
  release:
    name: Create GitHub Release
    needs: [build-electron, build-web]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Imperium ${{ github.ref_name }}
          body: |
            ## Imperium ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` installer |
            | macOS (auto-update) | `.zip` |
            | Windows | `.exe` NSIS installer |
            | Linux | `.AppImage` |
            | Web Satellite | `imperium-web-*.tar.gz` (deploy to any static host) |

            ### Connecting Satellites

            1. Launch the **Imperium** desktop app.
            2. Open the **Satellite Settings** panel to find the server port and token.
            3. Open the web/mobile satellite, enter the Master URL (e.g. `http://master-ip:9100`) and token.

            ---
            See the [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/electron-mac/*.dmg
            artifacts/electron-mac/*.zip
            artifacts/electron-win/*.exe
            artifacts/electron-linux/*.AppImage
            artifacts/electron-linux/*.deb
            artifacts/web-spa/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
